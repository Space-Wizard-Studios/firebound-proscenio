# Pre-commit hooks - single gate that mirrors CI locally.
#
# Install once:  pip install pre-commit && pre-commit install
# Run on demand: pre-commit run --all-files
#
# Skipping a hook (`--no-verify`) is a bug. Fix the underlying issue.

repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
            args: [--allow-multiple-documents]
          - id: check-toml
          - id: check-merge-conflict
          - id: check-added-large-files
            args: [--maxkb=1024]
            # Bundled binary fixtures + the pydantic-core Rust wheels
            # (~2 MB each, one per platform x ABI) are intentional repo
            # artifacts pinned to uv.lock; they exceed the source-file cap.
            exclude: ^(examples/.*\.(blend|psd|psb|kra|png)|apps/blender/wheels/.*\.whl)$

    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.8.4
      hooks:
          - id: ruff
            args: [--fix]
            files: ^apps/blender/
          - id: ruff-format
            files: ^apps/blender/

    # mypy runs via uv (not mirrors-mypy) so the strict-strict gate sees
    # the workspace deps it needs: pydantic, proscenio_models, the
    # fake-bpy stubs, numpy. mirrors-mypy installs mypy in isolation and
    # cannot resolve the workspace, which makes it useless for this repo.
    - repo: local
      hooks:
          - id: mypy
            name: mypy (apps/blender)
            language: system
            entry: uv run --project apps/blender --quiet mypy --config-file apps/blender/pyproject.toml
            files: ^apps/blender/.*\.py$
            pass_filenames: false
          - id: mypy-validator
            name: mypy (packages/validator)
            language: system
            entry: uv run --project apps/blender --quiet mypy --config-file packages/validator/pyproject.toml
            files: ^packages/validator/.*\.py$
            pass_filenames: false

    - repo: https://github.com/Scony/godot-gdscript-toolkit
      rev: 4.3.3
      hooks:
          - id: gdformat
            files: ^apps/godot/.*\.gd$
          - id: gdlint
            files: ^apps/godot/.*\.gd$

    - repo: https://github.com/python-jsonschema/check-jsonschema
      rev: 0.31.0
      hooks:
          - id: check-jsonschema
            name: validate .proscenio against schema
            files: \.proscenio$
            args:
                - --schemafile
                - packages/models/schemas/proscenio.schema.json

    - repo: https://github.com/streetsidesoftware/cspell-cli
      rev: v8.17.1
      hooks:
          - id: cspell
            args: [--no-progress, --no-summary]

    # Drift markers - reject the most common LLM-style artifacts that
    # leak into docs and code over time. Tighten the list when a new
    # pattern keeps appearing in review; see ".ai/conventions.md"
    # "Periodic audit" for the broader on-demand sweep.
    - repo: local
      hooks:
          - id: ban-em-dash
            name: ban em-dash (use hyphen-minus)
            language: pygrep
            entry: '—'
            types_or: [markdown, python, ts, tsx, gdscript]
            exclude: ^(node_modules|.+/dist|.+/__pycache__|\.ai/conventions\.md)$

          - id: ban-wave-numbering
            name: ban Wave N.M numeric markers in prose
            language: pygrep
            entry: '\bWave \d+\.\d+'
            types_or: [markdown, python, ts, tsx, gdscript]
            exclude: ^(node_modules|.+/dist|.+/__pycache__)/

          - id: ban-as-am-ids
            name: ban AS-AMxx opaque task IDs
            language: pygrep
            entry: '\bAS-AM\d+'
            types_or: [markdown, python, ts, tsx, gdscript]
            exclude: ^(node_modules|.+/dist|.+/__pycache__)/

          - id: ban-spec-nnn-inline
            name: ban SPEC NNN inline references (prefer feature names)
            language: pygrep
            entry: '\bSPEC \d{3}\b'
            types_or: [markdown, python, ts, tsx, gdscript]
            exclude: ^(node_modules|.+/dist|.+/__pycache__|\.ai/conventions\.md|specs/decisions\.md)$

          - id: ban-llm-filler
            name: ban LLM filler phrases
            language: pygrep
            entry: "\\b(obviously|Let's|Note that|It's important to|Keep in mind)\\b"
            types_or: [markdown, python, ts, tsx, gdscript]
            # .ai/conventions.md is the canonical reference: it ships the
            # forbidden tokens as part of the audit recipe and would
            # self-flag without this exclusion.
            exclude: ^(node_modules|.+/dist|.+/__pycache__|\.ai/conventions\.md)$

          - id: ban-substitution-artifacts
            name: ban doubled phrases left by substitution passes
            language: pygrep
            entry: '\bthe the \b|\bthis spec spec\b'
            types_or: [markdown, python, ts, tsx, gdscript]
            exclude: ^(node_modules|.+/dist|.+/__pycache__|\.ai/conventions\.md)$
