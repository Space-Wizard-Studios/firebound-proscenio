name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Ruff lint
        run: uvx ruff check apps/blender/
      - name: Ruff format check
        run: uvx ruff format --check apps/blender/
      - name: Mypy strict
        working-directory: apps/blender
        run: uvx --with mypy mypy --config-file pyproject.toml
      - name: Pytest (validation unit tests, no Blender)
        run: uvx --with pytest pytest tests/

  lint-photoshop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install
        working-directory: apps/photoshop
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: apps/photoshop
        run: pnpm run typecheck

  lint-gdscript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install gdtoolkit
      - run: gdformat --check apps/godot/addons/proscenio/
      - run: gdlint apps/godot/addons/proscenio/

  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install check-jsonschema
      - name: Validate examples and fixtures
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(examples/**/*.proscenio apps/godot/tests/fixtures/**/*.proscenio apps/blender/tests/fixtures/**/*.proscenio)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .proscenio files yet - skipping."
            exit 0
          fi
          check-jsonschema --schemafile schemas/proscenio.schema.json "${files[@]}"

  test-blender:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-5.1.1-linux-x64
      - name: Download Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/blender
          curl -fL "https://download.blender.org/release/Blender5.1/blender-5.1.1-linux-x64.tar.xz" \
            | tar -xJ -C ~/blender --strip-components=1
      - name: Re-export every fixture and diff against goldens
        run: |
          ~/blender/blender --background \
            --python apps/blender/tests/run_tests.py

  test-godot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-4.6.2-stable-linux-x86_64
      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          curl -fLo /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          unzip /tmp/godot.zip -d ~/godot
          mv ~/godot/Godot_v4.6.2-stable_linux.x86_64 ~/godot/godot
          chmod +x ~/godot/godot
      - name: Run importer smoke test
        run: |
          ~/godot/godot --headless --path apps/godot \
            --script res://tests/test_importer.gd
