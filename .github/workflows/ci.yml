name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Ruff lint
        run: uvx ruff check blender-addon/
      - name: Ruff format check
        run: uvx ruff format --check blender-addon/

  lint-gdscript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install gdtoolkit
      - run: gdformat --check godot-plugin/addons/proscenio/
      - run: gdlint godot-plugin/addons/proscenio/

  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install check-jsonschema
      - name: Validate examples and fixtures
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(examples/**/*.proscenio godot-plugin/tests/fixtures/**/*.proscenio blender-addon/tests/fixtures/**/*.proscenio)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .proscenio files yet — skipping."
            exit 0
          fi
          check-jsonschema --schemafile schemas/proscenio.schema.json "${files[@]}"
