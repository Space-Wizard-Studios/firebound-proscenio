name: Release

on:
  push:
    tags:
      - "blender-v*"
      - "godot-v*"
      - "photoshop-v*"
  # Tagless dry-run: exercise the package steps without uploading a
  # release. The photoshop `.jsx` copy rotted unnoticed precisely because
  # this job only ever ran on tags; a dispatch path keeps it exercisable.
  workflow_dispatch:
    inputs:
      component:
        description: "Component to package (dry-run, no release upload)"
        required: true
        type: choice
        options:
          - blender
          - godot
          - photoshop
      version:
        description: "Version string for the artifact name"
        required: false
        default: "0.0.0-dry-run"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine component and version
        id: meta
        # Route the dispatch inputs through env vars rather than expanding
        # `${{ inputs.* }}` straight into the script body: `version` is a
        # free-text input, so a direct expansion is a shell-injection vector.
        env:
          INPUT_COMPONENT: ${{ inputs.component }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            component="$INPUT_COMPONENT"
            version="$INPUT_VERSION"
          else
            tag="${GITHUB_REF#refs/tags/}"
            component="${tag%-v*}"
            version="${tag##*-v}"
          fi
          echo "name=$component" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # The photoshop artifact is the built UXP bundle, not a source file.
      # `apps/photoshop/dist/` is gitignored, so the job builds it here.
      - name: Set up Node (photoshop)
        if: steps.meta.outputs.name == 'photoshop'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up pnpm (photoshop)
        if: steps.meta.outputs.name == 'photoshop'
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Build the UXP plugin (photoshop)
        if: steps.meta.outputs.name == 'photoshop'
        working-directory: apps/photoshop
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build artifact
        # Same defense as the meta step: the version rides an env var, never
        # a `${{ }}` expansion inside the script body.
        env:
          COMPONENT: ${{ steps.meta.outputs.name }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          mkdir -p dist
          case "$COMPONENT" in
            blender)
              (cd apps/blender && zip -r "../../dist/proscenio-blender-$VERSION.zip" . -x "tests/*" "pyproject.toml" "README.md")
              ;;
            godot)
              (cd apps/godot && zip -r "../../dist/proscenio-godot-$VERSION.zip" addons/proscenio)
              ;;
            photoshop)
              # The UXP plugin root is dist/ itself - manifest.json lands
              # there after the webpack build - so archive its contents,
              # keeping manifest.json at the zip root for the host loader.
              (cd apps/photoshop/dist && zip -r "../../../dist/proscenio-photoshop-$VERSION.zip" .)
              ;;
            *)
              echo "Unknown component: $COMPONENT"
              exit 1
              ;;
          esac

      - name: List artifact contents
        run: |
          for f in dist/*.zip; do
            echo "== $f =="
            unzip -l "$f"
          done

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          files: dist/*
