sonar.projectKey=proscenio
sonar.sources=apps/blender,apps/godot,apps/photoshop,scripts,schemas
sonar.exclusions=**/__pycache__/**,**/*.uid,**/dist/**

# Blender requires operator/panel class names to match the
# `CATEGORY_OT_name` / `CATEGORY_PT_name` shape (validated at register_class).
# Default S101 regex doesn't admit this; widen format on a SonarQube server
# (only honored in connected mode). Mirrored by `python:S101: off` in the
# standalone .vscode/settings.json since SonarLint standalone ignores params.
sonar.python.S101.format=^_?([A-Z][A-Za-z0-9_]*|[a-z_][a-z0-9_]*)$
