sonar.projectKey=proscenio
sonar.sources=apps/blender,apps/godot,apps/photoshop,packages,scripts
sonar.tests=apps/blender/tests,apps/godot/tests,apps/photoshop/uxp-plugin-tests,tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.11

# Coverage reports. Generated BEFORE the scan and written under the repo root
# so they resolve against sonar.projectBaseDir (the Docker scan mounts the repo
# at /usr/src - reports made on the host must carry repo-root-relative paths).
# Python coverage combines two interpreters into one report (see
# [tool.coverage.run] parallel + relative_files in pyproject.toml):
#   # in-Blender pass (lifts the bpy-bound writer/exporter line coverage;
#   # needs coverage.py in Blender's bundled Python):
#   blender -b --factory-startup --python apps/blender/tests/run_coverage.py -- fixtures
#   blender -b --factory-startup --python apps/blender/tests/run_coverage.py -- operators
#   # pure-pytest pass, --cov-append so the in-Blender data survives:
#   uv run --all-packages --all-groups pytest tests/ \
#     --cov=packages --cov=apps/blender --cov=scripts --cov-append --cov-report=
#   uv run coverage xml -o coverage.xml   # merges the parallel .coverage.* files
#   pnpm -C apps/photoshop run test:coverage   # -> apps/photoshop/coverage/lcov.info
# GDScript (apps/godot) has no Sonar coverage analyzer, so it never contributes.
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=apps/photoshop/coverage/lcov.info

# Coverage denominator exclusions: code the unit suites cannot reach, so it does
# not count as "uncovered". bpy-bound dirs (operators / panels / properties /
# core/bpy_helpers) are now measurable via apps/blender/tests/run_coverage.py, but
# their in-Blender integration coverage is still low (the headless suites exercise
# specific scenarios, not the full operator/UI surface), so they stay excluded for
# now to keep the denominator honest; the writer under exporters/ is NOT excluded
# and gains directly from the combined report. src/components + src/panels are
# presentational React (render / composition); the business logic they invoke
# lives in hooks / lib / api, which stay measured. __init__.py are thin
# registration / re-export orchestrators; scripts/ are one-off tooling; entry.ts
# is the @ts-nocheck UXP host shim. schema_bindings/ is out via sonar.exclusions.
sonar.coverage.exclusions=\
  **/__init__.py,\
  apps/blender/operators/**,\
  apps/blender/panels/**,\
  apps/blender/properties/**,\
  apps/blender/core/bpy_helpers/**,\
  scripts/**,\
  packages/fixtures/**,\
  **/__main__.py,\
  apps/blender/importers/photoshop/armature.py,\
  packages/validator/src/proscenio_validator/addon_loader.py,\
  apps/photoshop/src/components/**,\
  apps/photoshop/src/panels/**,\
  apps/photoshop/src/entry.ts,\
  apps/photoshop/src/**/*.d.ts

# Exclusions: vendored deps, build outputs, caches, minified bundles, generated/binary fixtures.
# Note: SCM provider already filters .gitignore'd paths, but explicit globs skip directory walks
# (avoids broken-symlink warnings under pnpm-flattened node_modules on Windows).
sonar.exclusions=\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  **/.ruff_cache/**,\
  **/.mypy_cache/**,\
  **/.venv/**,\
  **/venv/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/out/**,\
  **/coverage/**,\
  **/htmlcov/**,\
  **/.coverage,\
  **/*.min.js,\
  **/*.min.css,\
  **/*.uid,\
  **/*.import,\
  **/.godot/**,\
  **/.import/**,\
  **/schema_bindings/**,\
  packages/models/schemas/**,\
  apps/godot/test_dummy/**,\
  apps/godot/effect/**,\
  apps/godot/dummy/**,\
  examples/**/*_workbench.blend,\
  examples/**/*.expected.actual.proscenio,\
  packages/validator/validate_automesh_debug/**,\
  packages/validator/validate_automesh_report.json,\
  scripts/*.out,\
  scripts/*.log,\
  scripts/*.out.proscenio,\
  **/*.atlas.json,\
  **/*.atlas.png,\
  apps/blender/tests/**,\
  apps/godot/tests/**,\
  apps/photoshop/uxp-plugin-tests/**

# Test-side exclusions (fixtures are frozen JSON / binary, not code under test)
sonar.test.exclusions=\
  **/fixtures/**,\
  **/*.json,\
  **/*.blend,\
  **/*.png

# Blender requires operator/panel class names to match the
# `CATEGORY_OT_name` / `CATEGORY_PT_name` shape (validated at register_class).
# Default S101 regex doesn't admit this; widen format on a SonarQube server
# (only honored in connected mode). Mirrored by `python:S101: off` in the
# standalone .vscode/settings.json since SonarLint standalone ignores params.
sonar.python.S101.format=^_?([A-Z][A-Za-z0-9_]*|[a-z_][a-z0-9_]*)$

# Multicriteria ignore - belt + suspenders. The S101.format widening above
# only kicks in on connected-mode SonarQube; multicriteria ignore works on
# both the server and SonarLint. Suppresses python:S101 noise on Blender
# operator / panel classes that must match the CATEGORY_OT_ / CATEGORY_PT_
# shape per Blender's register_class contract.
sonar.issue.ignore.multicriteria=blenderClassNames1,blenderClassNames2,blenderClassNames3,blenderClassNames4,uxpNativeButton,hostThemeContrast,wrappedSetterName,crossEnvGlobalGuard,selectionSnapshot,dataclassReplaceReturn,forwardDesignParam,parallelPairParam
sonar.issue.ignore.multicriteria.blenderClassNames1.ruleKey=python:S101
sonar.issue.ignore.multicriteria.blenderClassNames1.resourceKey=apps/blender/operators/**/*.py
sonar.issue.ignore.multicriteria.blenderClassNames2.ruleKey=python:S101
sonar.issue.ignore.multicriteria.blenderClassNames2.resourceKey=apps/blender/panels/**/*.py
sonar.issue.ignore.multicriteria.blenderClassNames3.ruleKey=python:S101
sonar.issue.ignore.multicriteria.blenderClassNames3.resourceKey=apps/blender/properties/**/*.py
sonar.issue.ignore.multicriteria.blenderClassNames4.ruleKey=python:S101
sonar.issue.ignore.multicriteria.blenderClassNames4.resourceKey=apps/blender/__init__.py

# Platform / analyzer false positives that cannot be fixed in code without
# breaking the host platform or the intended behavior. Each is also turned
# off in .vscode/settings.json for SonarLint standalone; these mirror them
# for the connected-mode server scan.

# S6819: UXP's mini-DOM renders a native <button> with no text content, so
# plugin components use `role="button"` spans/divs with explicit keyboard
# handlers. The constraint is plugin-wide (mini-DOM), not panels-only - covers
# components/ (Accordion) and panels/ alike.
sonar.issue.ignore.multicriteria.uxpNativeButton.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.uxpNativeButton.resourceKey=apps/photoshop/src/**/*.tsx
# S7924: .proscenio-panel inherits Photoshop's dark host chrome, invisible to
# the analyzer, so it scores the white text against the wrong background.
sonar.issue.ignore.multicriteria.hostThemeContrast.ruleKey=css:S7924
sonar.issue.ignore.multicriteria.hostThemeContrast.resourceKey=apps/photoshop/src/styles.css
# S6754: the raw useState setter is named set<X>State on purpose, distinct
# from the public memoised set<X> wrapper the hook returns.
sonar.issue.ignore.multicriteria.wrappedSetterName.ruleKey=typescript:S6754
sonar.issue.ignore.multicriteria.wrappedSetterName.resourceKey=apps/photoshop/src/hooks/**/*.ts
# S7741: `typeof globalThis.window` is the runtime guard for the UXP / Node
# environments where window is absent though TypeScript types it as present.
sonar.issue.ignore.multicriteria.crossEnvGlobalGuard.ruleKey=typescript:S7741
sonar.issue.ignore.multicriteria.crossEnvGlobalGuard.resourceKey=apps/photoshop/src/utils/log.ts
# S7504: `list(context.selected_objects)` is an intentional snapshot taken
# before the loop mutates selection via select_set().
sonar.issue.ignore.multicriteria.selectionSnapshot.ruleKey=python:S7504
sonar.issue.ignore.multicriteria.selectionSnapshot.resourceKey=apps/blender/core/bpy_helpers/**/*_session.py
# S5886: dataclasses.replace() is typed as DataclassInstance; mypy (the gate)
# accepts the PaintPresetSnapshot return, so this is a SonarLint inference gap.
sonar.issue.ignore.multicriteria.dataclassReplaceReturn.ruleKey=python:S5886
sonar.issue.ignore.multicriteria.dataclassReplaceReturn.resourceKey=apps/blender/core/skinning/paint_preset_2d.py
# S1172: compute_all_steiners keeps `inner_loops` for the deferred CDT-constraint
# extension documented in its docstring (forward-design placeholder).
sonar.issue.ignore.multicriteria.forwardDesignParam.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.forwardDesignParam.resourceKey=apps/blender/core/bpy_helpers/automesh/authoring_pipeline.py
# S1172: apply_2d_preset takes `mirror_x` to mirror build_target_preset's
# signature (the build / apply preset pair shares one call shape).
sonar.issue.ignore.multicriteria.parallelPairParam.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.parallelPairParam.resourceKey=apps/blender/core/skinning/paint_preset_2d.py
