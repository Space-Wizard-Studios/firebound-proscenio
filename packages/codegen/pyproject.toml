[project]
name = "proscenio-codegen"
version = "0.1.0"
description = "CLI that reads the proscenio-models pydantic source of truth and emits JSON Schema, TypeScript bindings, GDScript Resources, and Markdown documentation. Run via `python -m proscenio_codegen <subcommand>`."
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }
dependencies = [
    "proscenio-models",
    "pydantic>=2.8,<3",
]

[tool.uv.sources]
proscenio-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/proscenio_codegen"]

[tool.mypy]
# 3.11 floor: the codegen CLI runs under a standalone interpreter
# (`python -m proscenio_codegen`), not Blender's bundled 3.13.
python_version = "3.11"
# The pydantic plugin teaches mypy the model surface the emitter walks.
plugins = ["pydantic.mypy"]
strict = true
warn_unused_ignores = true
warn_unreachable = true
warn_return_any = true
extra_checks = true
strict_equality = true
# disallow_any_explicit (kept in the bpy-bound profiles) is dropped here:
# the emitter reasons over typing internals (get_args / get_origin /
# Union / Annotated) whose payloads are Any by the stdlib contract, and
# pydantic's synthesized model methods carry explicit Any besides.
disallow_any_decorated = true
disallow_any_unimported = true
disallow_subclassing_any = true
explicit_package_bases = true
namespace_packages = true
mypy_path = "${MYPY_CONFIG_FILE_DIR}/src"
files = ["${MYPY_CONFIG_FILE_DIR}/src/proscenio_codegen"]
