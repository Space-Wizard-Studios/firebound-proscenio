[project]
name = "proscenio-codegen"
version = "0.1.0"
description = "CLI that reads the proscenio-models pydantic source of truth and emits JSON Schema, TypeScript bindings, GDScript Resources, and Markdown documentation. Run via `python -m proscenio_codegen <subcommand>`."
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }
dependencies = [
    "proscenio-models",
    "pydantic>=2.8,<3",
]

[tool.uv.sources]
proscenio-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/proscenio_codegen"]
