[project]
name = "proscenio-validator"
version = "0.1.0"
description = "Headless automesh validator. Drives bpy.ops.proscenio.automesh_from_sprite per fixture sprite and reports invariants, per-pixel coverage, and hole bleed."
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/proscenio_validator"]
