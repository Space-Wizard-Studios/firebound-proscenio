[project]
name = "proscenio-validator"
version = "0.1.0"
description = "Headless automesh validator. Drives bpy.ops.proscenio.automesh_from_sprite per fixture sprite and reports invariants, per-pixel coverage, and hole bleed."
# `requires-python` floor is >=3.11 for packaging / tooling compatibility
# (uv resolution, editable install in the dev venv). The validator's actual
# runtime is Blender 5.x's embedded CPython 3.13: it runs via
# `blender --background --python scripts/validate_automesh.py` and never
# under a standalone interpreter. `tool.mypy.python_version = "3.13"` below
# reflects that real runtime; the two values are deliberately different.
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/proscenio_validator"]

[tool.mypy]
# Pinned to Python 3.13 to match Blender 5.x's bundled interpreter
# (see apps/blender/pyproject.toml for the rationale).
python_version = "3.13"
strict = true
warn_unused_ignores = true
warn_unreachable = true
warn_return_any = true
extra_checks = true
strict_equality = true
disallow_any_explicit = true
disallow_any_decorated = true
disallow_any_unimported = true
disallow_subclassing_any = true
explicit_package_bases = true
namespace_packages = true
mypy_path = "${MYPY_CONFIG_FILE_DIR}/src"
files = ["${MYPY_CONFIG_FILE_DIR}/src/proscenio_validator"]

# Tier-2 paths: heavy bpy.data / bpy.ops surface with stub gaps + raw
# dict[str, object] payload bags. Cleaned module-by-module via the
# "bpy stub sweep" backlog entry. Strict gate runs against the pure
# (no-bpy) modules: invariants.py + cli.py + report.py.
[[tool.mypy.overrides]]
module = [
    "proscenio_validator.addon_loader",
    "proscenio_validator.coverage",
    "proscenio_validator.measurement",
]
ignore_errors = true
