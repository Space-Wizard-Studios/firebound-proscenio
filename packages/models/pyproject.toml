[project]
name = "proscenio-models"
version = "0.1.0"
description = "Pydantic models that describe the .proscenio interchange format produced by the Blender addon and consumed by the Godot plugin. Source of truth for the JSON Schema, the Photoshop TypeScript bindings, and the Godot Resource bindings."
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }
dependencies = [
    "pydantic>=2.8,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/proscenio_models"]

[tool.mypy]
# 3.11 floor: this package runs under a standalone interpreter (codegen
# CLI, the validator's pytest), not Blender's bundled 3.13 - so the type
# gate matches its real minimum runtime, unlike the bpy-bound packages.
python_version = "3.11"
# The pydantic plugin teaches mypy the synthesized model __init__ surface,
# which also sharpens the codegen package that constructs and walks these
# models.
plugins = ["pydantic.mypy"]
strict = true
warn_unused_ignores = true
warn_unreachable = true
warn_return_any = true
extra_checks = true
strict_equality = true
# disallow_any_explicit (kept in the bpy-bound profiles) is dropped here:
# pydantic's plugin-synthesized methods carry explicit Any on every
# field-bearing model, so the flag would fire on the model definitions
# themselves rather than on author-written looseness.
disallow_any_decorated = true
disallow_any_unimported = true
disallow_subclassing_any = true
explicit_package_bases = true
namespace_packages = true
mypy_path = "${MYPY_CONFIG_FILE_DIR}/src"
files = ["${MYPY_CONFIG_FILE_DIR}/src/proscenio_models"]
