schema_version = "1.0.0"

id = "proscenio"
version = "0.1.0"
name = "Proscenio"
tagline = "Blender → Godot 4 pipeline for 2D cutout animation"
maintainer = "Space Wizard Studios <contato@spacewiz.dev>"
type = "add-on"

website = "https://github.com/Space-Wizard-Studios/firebound-proscenio"

tags = ["Animation", "Mesh", "Pipeline", "Rigging"]

blender_version_min = "4.2.0"

license = ["SPDX:GPL-3.0-or-later"]
copyright = ["2026 Space Wizard Studios"]

# Bundled Python wheels. Blender 4.2+ installs these into the extension's
# isolated site-packages so the addon code can `import pydantic` /
# `import proscenio_models` without polluting Blender's bundled Python.
#
# pydantic + pydantic-core + transitive pure-Python deps power the typed
# domain models in `packages/models/`. `pydantic-core` ships per-platform
# wheels (Rust-backed extension); the rest are pure-Python wheels valid
# on every platform.
#
# Regenerate via the recipe in `apps/blender/wheels/README.md`. The
# pinned versions match `uv.lock` at the repo root so workspace dev and
# the bundled addon resolve to the same pydantic build.
wheels = [
    "./wheels/annotated_types-0.7.0-py3-none-any.whl",
    "./wheels/proscenio_models-0.1.0-py3-none-any.whl",
    "./wheels/pydantic-2.13.4-py3-none-any.whl",
    # pydantic-core is a Rust extension: one wheel per (platform, Python ABI).
    # cp311 covers Blender 4.2 LTS (Python 3.11); cp313 covers Blender 5.x
    # (Python 3.13). Blender installs the wheel matching the running ABI.
    "./wheels/pydantic_core-2.46.4-cp311-cp311-macosx_10_12_x86_64.whl",
    "./wheels/pydantic_core-2.46.4-cp311-cp311-macosx_11_0_arm64.whl",
    "./wheels/pydantic_core-2.46.4-cp311-cp311-manylinux_2_17_aarch64.manylinux2014_aarch64.whl",
    "./wheels/pydantic_core-2.46.4-cp311-cp311-manylinux_2_17_x86_64.manylinux2014_x86_64.whl",
    "./wheels/pydantic_core-2.46.4-cp311-cp311-win_amd64.whl",
    "./wheels/pydantic_core-2.46.4-cp313-cp313-macosx_10_12_x86_64.whl",
    "./wheels/pydantic_core-2.46.4-cp313-cp313-macosx_11_0_arm64.whl",
    "./wheels/pydantic_core-2.46.4-cp313-cp313-manylinux_2_17_aarch64.manylinux2014_aarch64.whl",
    "./wheels/pydantic_core-2.46.4-cp313-cp313-manylinux_2_17_x86_64.manylinux2014_x86_64.whl",
    "./wheels/pydantic_core-2.46.4-cp313-cp313-win_amd64.whl",
    "./wheels/typing_extensions-4.15.0-py3-none-any.whl",
    "./wheels/typing_inspection-0.4.2-py3-none-any.whl",
]
